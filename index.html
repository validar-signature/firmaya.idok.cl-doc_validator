<script>
    document.getElementById('cve_form').addEventListener('submit', function(event) {
        // Evitamos que el formulario intente ir a otra página
        event.preventDefault(); 

        const valorEntrada = document.getElementById('cve').value;
        const mensajeDiv = document.getElementById('resultado_mensaje');

        // Mostramos mensaje de carga
        mensajeDiv.innerHTML = "<span style='color:#fff;'>Buscando documento...</span>";

        // Estructura JSON para Make
        const datosParaMake = {
            nombre: valorEntrada
        };

        // Petición al Webhook
        fetch('https://hook.us2.make.com/iq6ps3txx1jaxr91mje7sx47ynbta3kb', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(datosParaMake)
        })
        .then(response => {
            if (response.ok) {
                // Éxito al enviar
                mensajeDiv.innerHTML = "<span style='color:#00a55e;'>¡Búsqueda procesada con éxito!</span>";
            } else {
                // Error del servidor (ej. Make caído o mal configurado)
                mensajeDiv.innerHTML = "<span style='color:#e74c3c;'>Error de comunicación con el servidor.</span>";
            }
        })
        .catch(error => {
            console.error('Error:', error);
            // Error en la red o CORS
            mensajeDiv.innerHTML = "<span style='color:#e74c3c;'>Error en la petición de red.</span>";
        });
    });
</script>
