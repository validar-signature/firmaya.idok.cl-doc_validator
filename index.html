<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Firma Ya — Verificación</title>
  <style>
    :root{
      --bg:#0f1724; --card:#0b1220; --accent1:#06b6d4; --accent2:#4f46e5;
      --green:#6ee7b7; --muted:#94a3b8; --glass: rgba(255,255,255,0.03);
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
    }
    html,body{height:100%}
    body{
      margin:0; background:linear-gradient(180deg,#071029 0%,#071827 60%);
      color:#e6eef8; display:flex; align-items:center; justify-content:center; padding:28px;
    }
    .container{width:100%;max-width:820px;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));border-radius:14px;padding:28px;border:1px solid rgba(255,255,255,0.03);backdrop-filter:blur(6px)}
    header{display:flex;align-items:center;gap:16px;margin-bottom:18px}
    .logo-wrap{width:72px;height:72px;border-radius:12px;background:linear-gradient(135deg,var(--green),#60a5fa);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(2,6,23,0.6)}
    .brand{margin:0}
    h1{font-size:20px;margin:0} p.lead{margin:4px 0 0;color:var(--muted);font-size:13px}
    form{display:grid;grid-template-columns:1fr auto;gap:12px;margin-top:18px;align-items:center}
    input[type="text"]{padding:14px 16px;border-radius:10px;border:1px solid rgba(255,255,255,0.04);background:var(--glass);color:inherit;font-size:15px;outline:none}
    input[type="text"]:focus{box-shadow:0 6px 20px rgba(99,102,241,0.12);border-color:rgba(99,102,241,0.6)}
    button{padding:12px 18px;border-radius:10px;border:0;background:linear-gradient(90deg,var(--accent2),var(--accent1));color:white;font-weight:600;cursor:pointer}
    .small{font-size:13px;color:var(--muted);margin-top:12px}
    .result{margin-top:18px;padding:14px;border-radius:10px;background:linear-gradient(180deg,rgba(255,255,255,0.01),rgba(255,255,255,0.02));border:1px solid rgba(255,255,255,0.02);min-height:56px;display:flex;align-items:center;gap:12px}
    .msg{color:var(--muted);font-size:14px}
    .badge{padding:6px 10px;border-radius:999px;font-weight:700;font-size:13px}
    .badge.pending{background:rgba(255,255,255,0.03);color:var(--muted)}
    .badge.ok{background:linear-gradient(90deg,#4ade80,#34d399);color:#042027}
    .badge.err{background:linear-gradient(90deg,#ff6b6b,#fb7185);color:#2b0a0a}
    .copy-btn{background:transparent;border:1px solid rgba(255,255,255,0.04);padding:8px 10px;border-radius:8px;color:var(--muted);cursor:pointer}
    .spinner{width:18px;height:18px;border-radius:50%;border:3px solid rgba(255,255,255,0.08);border-top-color:var(--green);animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    footer{margin-top:18px;color:var(--muted);font-size:12px;display:flex;justify-content:space-between;align-items:center}
    @media (max-width:640px){form{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="container" role="main" aria-labelledby="title">
    <header>
      <div class="logo-wrap" aria-hidden="true">
        <!-- SVG corporativo inline: icono abstracto azul-verde -->
        <svg width="56" height="56" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Logo Firma Ya">
          <defs>
            <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0" stop-color="#06b6d4"/>
              <stop offset="1" stop-color="#4f46e5"/>
            </linearGradient>
            <linearGradient id="g2" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0" stop-color="#6ee7b7"/>
              <stop offset="1" stop-color="#34d399"/>
            </linearGradient>
          </defs>
          <rect x="0" y="0" width="64" height="64" rx="12" fill="url(#g1)"/>
          <path d="M18 40c6-8 18-12 28-8" stroke="white" stroke-opacity="0.95" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="44" cy="22" r="8" fill="url(#g2)" stroke="white" stroke-opacity="0.12" stroke-width="1.5"/>
        </svg>
      </div>

      <div>
        <h1 id="title" class="brand">Firma Ya — Verificación de documento</h1>
        <p class="lead">Introduce el identificador para validar el documento de forma segura.</p>
      </div>
    </header>

    <form id="verifyForm" autocomplete="off" novalidate>
      <input id="idInput" name="identifier" type="text" placeholder="Ejemplo: 63374f267c842e0b98401c49" aria-label="Identificador" required />
      <button id="submitBtn" type="submit" aria-live="polite">Verificar</button>
    </form>

    <div class="small">Firma Ya procesa tu solicitud de forma segura. No compartimos detalles técnicos con el cliente.</div>

    <div class="result" id="result" aria-live="polite" hidden>
      <div style="display:flex;align-items:center;justify-content:space-between;width:100%">
        <div>
          <div class="msg" id="resultMsg">Esperando acción</div>
          <div class="msg" id="resultDetail" style="font-size:13px;color:var(--muted)"></div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <div id="statusBadge" class="badge pending">Inactivo</div>
          <button id="copyBtn" class="copy-btn" title="Copiar respuesta">Copiar</button>
        </div>
      </div>
    </div>

    <footer>
      <div class="msg">Firma Ya</div>
      <div class="msg" style="font-family:monospace;font-size:12px;color:var(--muted)">Verificación segura</div>
    </footer>
  </div>

  <script>
    // Endpoint propio que reenvía al webhook de Make
    const apiEndpoint = '/api/verify';

    const form = document.getElementById('verifyForm');
    const input = document.getElementById('idInput');
    const result = document.getElementById('result');
    const resultMsg = document.getElementById('resultMsg');
    const resultDetail = document.getElementById('resultDetail');
    const statusBadge = document.getElementById('statusBadge');
    const copyBtn = document.getElementById('copyBtn');
    const submitBtn = document.getElementById('submitBtn');

    function setStatus(type, mainText, detailText){
      result.hidden = false;
      resultMsg.textContent = mainText;
      resultDetail.textContent = detailText || '';
      statusBadge.className = 'badge ' + (type === 'ok' ? 'ok' : type === 'err' ? 'err' : 'pending');
      statusBadge.textContent = type === 'ok' ? 'Éxito' : type === 'err' ? 'Error' : 'En progreso';
    }

    function validateId(value){
      // Acepta exactamente 24 caracteres hexadecimales (ej: Mongo ObjectId)
      const re = /^[a-fA-F0-9]{24}$/;
      return re.test(value.trim());
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const value = (input.value || '').trim();
      if(!value){ setStatus('err','Campo vacío','Por favor ingresa el identificador.'); return; }
      if(!validateId(value)){ setStatus('err','Formato inválido','El identificador debe tener 24 caracteres hexadecimales.'); return; }

      setStatus('pending','Enviando a Firma Ya','Procesando la verificación...');
      submitBtn.disabled = true;
      const spinner = document.createElement('span'); spinner.className = 'spinner'; submitBtn.prepend(spinner);

      try{
        // Enviar al endpoint propio; el servidor mapeará al campo que Make espera (por ejemplo "name")
        const res = await fetch(apiEndpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: value })
        });

        // Manejo flexible: servidor devuelve { status, message, data } o error
        const json = await res.json().catch(() => null);
        if(res.ok){
          setStatus('ok', json?.message || 'Verificación completada', json?.data ? JSON.stringify(json.data) : '');
        } else {
          setStatus('err', json?.error || ('HTTP ' + res.status), json?.details || '');
        }
      } catch(err){
        setStatus('err','Error de conexión', String(err));
      } finally {
        submitBtn.disabled = false;
        if(spinner && spinner.parentNode) spinner.remove();
      }
    });

    copyBtn.addEventListener('click', () => {
      const text = resultDetail.textContent || resultMsg.textContent || '';
      if(!text) return;
      navigator.clipboard?.writeText(text).then(() => {
        copyBtn.textContent = 'Copiado';
        setTimeout(()=> copyBtn.textContent = 'Copiar', 1500);
      }).catch(()=> {
        copyBtn.textContent = 'Error';
        setTimeout(()=> copyBtn.textContent = 'Copiar', 1500);
      });
    });
  </script>
</body>
</html>
